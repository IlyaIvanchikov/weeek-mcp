name: release

# Publish to npm + attach the .mcpb to a GitHub Release when a v* tag is pushed.
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret, provenance is automatic.
# One-time setup on npmjs.com: package "weeek-mcp-smart" → Settings → Trusted Publisher
#   → GitHub Actions, repo IlyaIvanchikov/weeek-mcp, workflow file release.yml.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC for npm trusted publishing + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      # Trusted publishing needs npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      # No token: OIDC trusted publishing. Provenance is generated automatically.
      - run: npm publish

      - name: Build the .mcpb bundle
        run: npm run pack:mcpb

      - name: Create GitHub Release with the .mcpb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" weeek-mcp-smart.mcpb --title "$GITHUB_REF_NAME" --generate-notes
